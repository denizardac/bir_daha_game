<!doctype html>
<html lang="tr">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <meta name="robots" content="noindex" />
    <title>Sayfa bulunamadı · Bir Daha</title>
    <style>
      :root { color-scheme: dark; font-family: system-ui, sans-serif; }
      body { min-height: 100vh; margin: 0; display: grid; place-items: center; background: #040b09; color: #f4f1e7; }
      main { width: min(28rem, calc(100% - 2rem)); }
      small { color: #d6a634; font-weight: 800; letter-spacing: .12em; text-transform: uppercase; }
      h1 { margin: .75rem 0 .5rem; font-size: clamp(2.5rem, 10vw, 4.5rem); line-height: .9; }
      p { color: #9db2ac; line-height: 1.5; }
      a { display: inline-block; margin-top: 1rem; padding: .8rem 1rem; border-radius: .7rem; color: #171205; background: #d6a634; font-weight: 800; text-decoration: none; }
    </style>
  </head>
  <body>
    <main>
      <small>404 · Maç burada değil</small>
      <h1>Bu sayfa bulunamadı.</h1>
      <p>Bağlantı değişmiş veya kaldırılmış olabilir. Ana ekrana dönüp yeni bir Run başlatabilirsin.</p>
      <a href="/">Ana ekrana dön</a>
    </main>
  </body>
</html>
